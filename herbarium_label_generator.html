<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herbarium Label Generator</title>
<style>
/* ── Screen UI ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;font-size:13px;background:#f0ece4;color:#1a1a1a;padding:16px;}
h1{font-size:16px;font-weight:normal;letter-spacing:0.05em;text-align:center;margin-bottom:16px;text-transform:uppercase;}
.controls{max-width:700px;margin:0 auto 20px;background:#fff;border:1px solid #ccc;border-radius:3px;padding:14px;}
.controls h2{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:#666;margin-bottom:10px;}
.ctrl-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px;}
.ctrl-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px;}
.ctrl-group label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#888;}
input,select{border:1px solid #bbb;border-radius:2px;padding:5px 7px;font-family:Georgia,serif;font-size:12px;width:100%;}
button{border:1px solid #1a1a1a;border-radius:2px;padding:6px 14px;font-family:Georgia,serif;font-size:12px;cursor:pointer;background:#e8e2d4;white-space:nowrap;}
button:active{opacity:0.7;}
button.primary{background:#1a1a1a;color:#fff;}
.status{font-size:11px;color:#666;margin-top:6px;font-style:italic;min-height:16px;}
.record-list{margin-top:10px;border-top:1px solid #eee;padding-top:8px;max-height:180px;overflow-y:auto;}
.record-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid #eee;cursor:pointer;}
.record-item:hover{background:#f5f1e8;}
.record-item input[type=checkbox]{width:auto;flex-shrink:0;}
.record-meta{font-size:11px;flex:1;}
.record-meta .specnum{font-weight:bold;}
.record-meta .sp{font-style:italic;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.preview-area{max-width:700px;margin:0 auto;}
#printBtn{display:none;}

/* ── Label layout (screen preview) ────────────────────────── */
.label-sheet{background:#fff;border:1px solid #ccc;border-radius:3px;padding:0.5in;margin-bottom:16px;}
.label-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.25in;}
.label{border:1px solid #333;padding:9pt 10pt;font-family:Georgia,serif;font-size:8pt;line-height:1.45;break-inside:avoid;page-break-inside:avoid;min-height:2.8in;}
.label-hdr{text-align:center;font-size:7pt;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid #555;padding-bottom:4pt;margin-bottom:5pt;font-weight:bold;}
.label-inst{font-size:6pt;text-align:center;color:#444;margin-top:1pt;}
.label-name{font-size:11pt;font-style:italic;font-weight:bold;margin:4pt 0 1pt;}
.label-auth{font-size:8pt;font-style:normal;font-weight:normal;display:inline;}
.label-family{font-size:7pt;text-align:right;color:#555;margin-bottom:4pt;}
.label-row{margin-bottom:2pt;font-size:8pt;}
.label-row .lbl{font-weight:bold;font-size:7pt;text-transform:uppercase;letter-spacing:0.05em;}
.label-assoc{margin-bottom:2pt;font-size:7.5pt;}
.label-assoc .lbl{font-weight:bold;font-size:7pt;text-transform:uppercase;letter-spacing:0.05em;}
.label-assoc .sp-list{font-style:italic;}
.label-env{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 8pt;margin:3pt 0;}
.label-env .lbl{font-weight:bold;font-size:6.5pt;text-transform:uppercase;letter-spacing:0.04em;display:block;}
.label-env .val{font-size:7.5pt;}
.label-coords{font-size:7pt;color:#333;margin:3pt 0;}
.label-footer{border-top:0.5px solid #888;margin-top:5pt;padding-top:3pt;font-size:7pt;}
.label-footer .collector{font-size:8pt;font-weight:bold;}
.label-specnum{font-size:9pt;font-weight:bold;text-align:right;}
.label-notes{font-size:7pt;color:#333;margin:2pt 0;font-style:italic;}
.placeholder-label{border:1px dashed #bbb;min-height:2.8in;display:flex;align-items:center;justify-content:center;color:#bbb;font-style:italic;font-size:10pt;}

/* ── Print styles ──────────────────────────────────────────── */
@media print {
  body{background:#fff;padding:0;}
  h1,.controls,#printBtn,.status,.btn-row{display:none!important;}
  .label-sheet{border:none;padding:0.4in;margin:0;box-shadow:none;}
  .label-grid{gap:0.2in;}
  .label{border:0.5pt solid #333;}
  .preview-area{max-width:none;}
  @page{size:letter;margin:0;}
}
</style>
</head>
<body>

<h1>Herbarium Label Generator</h1>

<div class="controls">
  <h2>Load Records</h2>

  <div class="ctrl-row">
    <div class="ctrl-group" style="max-width:340px;">
      <label>Apps Script URL</label>
      <input type="text" id="sheetUrl" value="https://script.google.com/macros/s/AKfycbwKyn2fKIY23TEK5eqQnY9OFTvmDf0qCSQuw26hOeKIwW50fs4aAoRDdmW1WQ4QvO9s/exec" />
    </div>
    <button onclick="loadList()">Load Record List</button>
  </div>

  <div class="ctrl-row">
    <div class="ctrl-group">
      <label>Fetch Mode</label>
      <select id="fetchMode" onchange="toggleFetchMode()">
        <option value="recent">Most recent N records</option>
        <option value="specnum">By specimen number</option>
        <option value="range">By specimen number range</option>
      </select>
    </div>
    <div class="ctrl-group" id="recentGroup">
      <label>How many</label>
      <input type="number" id="recentN" value="4" min="1" max="20" style="width:70px;" />
    </div>
    <div class="ctrl-group" id="specnumGroup" style="display:none;">
      <label>Specimen Number</label>
      <input type="text" id="specnumInput" placeholder="JJH-2026-001" />
    </div>
    <div class="ctrl-group" id="rangeFromGroup" style="display:none;">
      <label>From</label>
      <input type="text" id="rangeFrom" placeholder="JJH-2026-001" />
    </div>
    <div class="ctrl-group" id="rangeToGroup" style="display:none;">
      <label>To</label>
      <input type="text" id="rangeTo" placeholder="JJH-2026-004" />
    </div>
    <button class="primary" onclick="fetchAndRender()">Generate Labels</button>
  </div>

  <div class="status" id="status">Enter your Apps Script URL and click Generate Labels.</div>

  <div class="record-list" id="recordList" style="display:none;">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin-bottom:4px;">
      Select records to print &nbsp;
      <a href="#" onclick="selectAll(true);return false;" style="color:#555;">All</a> /
      <a href="#" onclick="selectAll(false);return false;" style="color:#555;">None</a>
    </div>
    <div id="recordItems"></div>
    <button onclick="printSelected()" style="margin-top:8px;">Print Selected</button>
  </div>
</div>

<div class="preview-area" id="previewArea"></div>

<div class="btn-row" style="max-width:700px;margin:0 auto;" id="printBtnRow" style="display:none;">
  <button class="primary" onclick="window.print()" id="printBtn">Print Labels</button>
  <button onclick="document.getElementById('previewArea').innerHTML='';document.getElementById('printBtnRow').style.display='none';">Clear</button>
</div>

<script>
const SHEETS_URL_DEFAULT = document.getElementById('sheetUrl').value;
let allRecords = [];

function url() { return document.getElementById('sheetUrl').value.trim(); }

function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isErr ? '#c00' : '#666';
}

function toggleFetchMode() {
  const m = document.getElementById('fetchMode').value;
  document.getElementById('recentGroup').style.display = m==='recent'?'':'none';
  document.getElementById('specnumGroup').style.display = m==='specnum'?'':'none';
  document.getElementById('rangeFromGroup').style.display = m==='range'?'':'none';
  document.getElementById('rangeToGroup').style.display = m==='range'?'':'none';
}

async function loadList() {
  setStatus('Loading record list…');
  try {
    const res = await fetch(url() + '?action=list');
    const data = await res.json();
    if (data.status !== 'success') { setStatus('Error: ' + data.message, true); return; }
    allRecords = data.records || [];
    renderList(allRecords);
    setStatus('Loaded ' + allRecords.length + ' records. Select and click Print Selected, or use Generate Labels above.');
  } catch(e) { setStatus('Failed to load: ' + e.message, true); }
}

function renderList(records) {
  const box = document.getElementById('recordList');
  const items = document.getElementById('recordItems');
  items.innerHTML = records.map((r,i) =>
    '<div class="record-item"><input type="checkbox" data-idx="'+i+'" />' +
    '<div class="record-meta">' +
    '<span class="specnum">' + (r.specnum||'') + '</span> &nbsp; ' +
    '<span class="sp">' + (r.species||'') + '</span> &nbsp; ' +
    (r.county ? r.county + ' Co.' : '') + ' &nbsp; ' + (r.date||'') +
    '</div></div>'
  ).join('');
  box.style.display = '';
}

function selectAll(val) {
  document.querySelectorAll('#recordItems input[type=checkbox]').forEach(cb => cb.checked = val);
}

async function printSelected() {
  const checked = [...document.querySelectorAll('#recordItems input[type=checkbox]:checked')];
  if (!checked.length) { setStatus('Select at least one record.', true); return; }
  const nums = checked.map(cb => allRecords[parseInt(cb.dataset.idx)].specnum);
  setStatus('Fetching ' + nums.length + ' record(s)…');
  const records = [];
  for (const n of nums) {
    const res = await fetch(url() + '?action=get&specnum=' + encodeURIComponent(n));
    const data = await res.json();
    if (data.status === 'success') records.push(data.record);
  }
  renderLabels(records);
}

async function fetchAndRender() {
  const mode = document.getElementById('fetchMode').value;
  setStatus('Fetching records…');
  try {
    let fetchUrl = url();
    if (mode === 'recent') {
      const n = document.getElementById('recentN').value || 4;
      fetchUrl += '?action=recent&n=' + n;
      const res = await fetch(fetchUrl);
      const data = await res.json();
      if (data.status !== 'success') { setStatus('Error: ' + data.message, true); return; }
      renderLabels(data.records || []);
    } else if (mode === 'specnum') {
      const s = document.getElementById('specnumInput').value.trim();
      if (!s) { setStatus('Enter a specimen number.', true); return; }
      const res = await fetch(url() + '?action=get&specnum=' + encodeURIComponent(s));
      const data = await res.json();
      if (data.status !== 'success') { setStatus('Error: ' + data.message, true); return; }
      renderLabels([data.record]);
    } else if (mode === 'range') {
      const from = document.getElementById('rangeFrom').value.trim();
      const to = document.getElementById('rangeTo').value.trim();
      if (!from||!to) { setStatus('Enter both From and To.', true); return; }
      const res = await fetch(url() + '?action=range&from=' + encodeURIComponent(from) + '&to=' + encodeURIComponent(to));
      const data = await res.json();
      if (data.status !== 'success') { setStatus('Error: ' + data.message, true); return; }
      renderLabels(data.records || []);
    }
  } catch(e) { setStatus('Fetch failed: ' + e.message, true); }
}

function buildLabel(r) {
  if (!r) return '<div class="placeholder-label">empty slot</div>';
  const sp = r['Species'] || '';
  const auth = r['Authority'] || '';
  const loc = r['Plants of (Locality)'] || '';
  const county = r['County'] || '';
  const state = r['State'] || '';
  const trs = r['TRS / QQ'] || '';
  const npcP = r['NPC Primary Code'] || '';
  const npcPN = r['NPC Primary Name'] || '';
  const npcS = r['NPC Secondary Code'] || '';
  const npcSN = r['NPC Secondary Name'] || '';
  const assoc = r['Associated Species'] || '';
  const hydro = r['Hydrology'] || '';
  const soil = r['Soil Texture'] || '';
  const sun = r['Sun Exposure'] || '';
  const lat = r['Latitude (NAD83)'] || '';
  const lon = r['Longitude (NAD83)'] || '';
  const collector = r['Primary Collector'] || '';
  const observers = r['Other Observers'] || '';
  const notes = r['Notes'] || '';
  const permit = r['Special Permit No.'] || '';
  const specnum = r['Specimen Number'] || '';
  const date = r['Date'] || '';

  // Format associated species: each name italicized, commas not
  const assocHtml = assoc ? assoc.split(',').map(s => s.trim()).filter(Boolean)
    .map(s => s.replace(/\.$/, ''))
    .map(s => '<em>' + esc(s) + '</em>')
    .join(', ') + '.' : '';

  return `<div class="label">
  <div class="label-hdr">Vascular Plant Voucher Specimen
    <div class="label-inst">Minnesota Biological Survey &bull; Minnesota DNR</div>
  </div>
  <div class="label-name"><em>${esc(sp)}</em> <span class="label-auth">${esc(auth)}</span></div>
  <div class="label-row"><span class="lbl">Locality:</span> ${esc(loc)}</div>
  <div class="label-row"><span class="lbl">County:</span> ${esc(county)}&nbsp;&nbsp;<span class="lbl">State:</span> ${esc(state)}&nbsp;&nbsp;<span class="lbl">TRS/QQ:</span> ${esc(trs)}</div>
  ${npcP ? `<div class="label-row"><span class="lbl">NPC:</span> ${esc(npcP)} ${esc(npcPN)}${npcS ? ' / ' + esc(npcS) + ' ' + esc(npcSN) : ''}</div>` : ''}
  ${assocHtml ? `<div class="label-assoc"><span class="lbl">Associated:</span> <span class="sp-list">${assocHtml}</span></div>` : ''}
  <div class="label-env">
    ${hydro ? `<div><span class="lbl">Hydrology</span><span class="val">${esc(hydro)}</span></div>` : '<div></div>'}
    ${soil ? `<div><span class="lbl">Soil</span><span class="val">${esc(soil)}</span></div>` : '<div></div>'}
    ${sun ? `<div><span class="lbl">Sun</span><span class="val">${esc(sun)}</span></div>` : '<div></div>'}
  </div>
  ${lat||lon ? `<div class="label-coords">NAD83 &nbsp; Lat: ${esc(lat)} &nbsp; Lon: ${esc(lon)}</div>` : ''}
  ${notes ? `<div class="label-notes">${esc(notes)}</div>` : ''}
  <div class="label-footer">
    <div class="collector">${esc(collector)}${observers ? ' &mdash; ' + esc(observers) : ''}</div>
    <div style="display:flex;justify-content:space-between;margin-top:2pt;">
      <span>${permit ? 'Permit No. ' + esc(permit) : ''}</span>
      <span class="label-specnum">${esc(specnum)} &nbsp; ${esc(date)}</span>
    </div>
  </div>
</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderLabels(records) {
  if (!records.length) { setStatus('No records returned.', true); return; }
  setStatus('Rendered ' + records.length + ' label(s). Use Print Labels to print.');

  // Pad to multiple of 4
  const padded = [...records];
  while (padded.length % 4 !== 0) padded.push(null);

  let html = '';
  for (let i = 0; i < padded.length; i += 4) {
    html += '<div class="label-sheet"><div class="label-grid">';
    for (let j = i; j < i+4; j++) {
      html += buildLabel(padded[j]);
    }
    html += '</div></div>';
  }

  const preview = document.getElementById('previewArea');
  preview.innerHTML = html;
  const btnRow = document.getElementById('printBtnRow');
  btnRow.style.display = 'flex';
  document.getElementById('printBtn').style.display = '';
  preview.scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
