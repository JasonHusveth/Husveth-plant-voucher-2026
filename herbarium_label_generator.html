<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herbarium Label Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;font-size:13px;background:#f0ece4;color:#1a1a1a;padding:16px;}
h1{font-size:16px;font-weight:normal;letter-spacing:0.05em;text-align:center;margin-bottom:16px;text-transform:uppercase;}
.controls{max-width:720px;margin:0 auto 20px;background:#fff;border:1px solid #ccc;border-radius:3px;padding:14px;}
.controls h2{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:#666;margin-bottom:10px;}
.ctrl-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px;}
.ctrl-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px;}
.ctrl-group label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#888;}
input,select{border:1px solid #bbb;border-radius:2px;padding:5px 7px;font-family:Georgia,serif;font-size:12px;width:100%;}
button{border:1px solid #1a1a1a;border-radius:2px;padding:6px 14px;font-family:Georgia,serif;font-size:12px;cursor:pointer;background:#e8e2d4;white-space:nowrap;}
button:active{opacity:0.7;}
button.primary{background:#1a1a1a;color:#fff;}
.status{font-size:11px;color:#666;margin-top:6px;font-style:italic;min-height:16px;}
.record-list{margin-top:10px;border-top:1px solid #eee;padding-top:8px;max-height:200px;overflow-y:auto;}
.record-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid #eee;}
.record-item:hover{background:#f5f1e8;}
.record-item input[type=checkbox]{width:auto;flex-shrink:0;}
.record-meta{font-size:11px;flex:1;}
.record-meta .specnum{font-weight:bold;}
.record-meta .sp{font-style:italic;}
.btn-row{display:flex;gap:8px;margin-top:12px;max-width:720px;margin-left:auto;margin-right:auto;}
.preview-area{max-width:720px;margin:0 auto;}

/* Label sheet */
.label-sheet{background:#fff;border:1px solid #ddd;border-radius:3px;padding:0.25in;margin-bottom:20px;}
.label-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5in;}

/* Individual label — no border, matches example format */
.label{font-family:Georgia,serif;font-size:9pt;line-height:1.55;break-inside:avoid;page-break-inside:avoid;min-height:3in;padding-bottom:6pt;}
.label-locality{font-size:9pt;text-align:center;}
.label-county{font-size:9pt;text-align:center;margin-bottom:7pt;}
.label-name{font-size:11pt;font-style:italic;margin-bottom:6pt;line-height:1.35;}
.label-name .auth{font-style:normal;font-size:9pt;}
.label-body{font-size:8.5pt;line-height:1.6;margin-bottom:5pt;text-align:left;}
.label-coords{font-size:8.5pt;margin-bottom:4pt;}
.label-collector{font-size:8.5pt;margin-bottom:2pt;}
.label-footer{margin-top:4pt;}
.label-footer-line{display:flex;justify-content:space-between;align-items:baseline;font-size:8.5pt;}
.label-permit{font-size:8.5pt;margin-top:1pt;}
.placeholder-label{min-height:3in;display:flex;align-items:center;justify-content:center;color:#ccc;font-style:italic;font-size:10pt;}

@media print {
  body{background:#fff;padding:0;}
  h1,.controls,.btn-row,.status{display:none!important;}
  .label-sheet{border:none;padding:0.25in;margin:0;page-break-after:always;}
  .label-grid{gap:0.5in;}
  .preview-area{max-width:none;}
  @page{size:letter;margin:0;}
}
</style>
</head>
<body>

<h1>Herbarium Label Generator</h1>

<div class="controls">
  <h2>Load Records</h2>
  <div class="ctrl-row">
    <div class="ctrl-group">
      <label>Apps Script URL</label>
      <input type="text" id="sheetUrl" value="https://script.google.com/macros/s/AKfycbwKyn2fKIY23TEK5eqQnY9OFTvmDf0qCSQuw26hOeKIwW50fs4aAoRDdmW1WQ4QvO9s/exec" />
    </div>
    <button onclick="loadList()">Load Record List</button>
  </div>

  <div class="ctrl-row">
    <div class="ctrl-group">
      <label>Fetch Mode</label>
      <select id="fetchMode" onchange="toggleFetchMode()">
        <option value="recent">Most recent N records</option>
        <option value="specnum">By specimen number</option>
        <option value="range">By specimen number range</option>
      </select>
    </div>
    <div class="ctrl-group" id="recentGroup">
      <label>How many</label>
      <input type="number" id="recentN" value="4" min="1" max="40" style="width:70px;" />
    </div>
    <div class="ctrl-group" id="specnumGroup" style="display:none;">
      <label>Specimen Number</label>
      <input type="text" id="specnumInput" placeholder="JJH-2026-001" />
    </div>
    <div class="ctrl-group" id="rangeFromGroup" style="display:none;">
      <label>From</label>
      <input type="text" id="rangeFrom" placeholder="JJH-2026-001" />
    </div>
    <div class="ctrl-group" id="rangeToGroup" style="display:none;">
      <label>To</label>
      <input type="text" id="rangeTo" placeholder="JJH-2026-004" />
    </div>
    <button class="primary" onclick="fetchAndRender()">Generate Labels</button>
  </div>

  <div class="status" id="status">Enter your Apps Script URL and click Generate Labels.</div>

  <div class="record-list" id="recordList" style="display:none;">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin-bottom:4px;">
      Select records &nbsp;
      <a href="#" onclick="selectAll(true);return false;" style="color:#555;">All</a> /
      <a href="#" onclick="selectAll(false);return false;" style="color:#555;">None</a>
    </div>
    <div id="recordItems"></div>
    <button onclick="printSelected()" style="margin-top:8px;">Generate Labels for Selected</button>
  </div>
</div>

<div class="btn-row" id="printBtnRow" style="display:none;">
  <button class="primary" onclick="window.print()">Print Labels</button>
  <button onclick="document.getElementById('previewArea').innerHTML='';document.getElementById('printBtnRow').style.display='none';">Clear</button>
</div>

<div class="preview-area" id="previewArea"></div>

<script>
let allRecords = [];
window._labelDebug = true; // set false to disable console logging

function url() { return document.getElementById('sheetUrl').value.trim(); }

function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isErr ? '#c00' : '#666';
}

function toggleFetchMode() {
  const m = document.getElementById('fetchMode').value;
  document.getElementById('recentGroup').style.display    = m==='recent'  ? '' : 'none';
  document.getElementById('specnumGroup').style.display   = m==='specnum' ? '' : 'none';
  document.getElementById('rangeFromGroup').style.display = m==='range'   ? '' : 'none';
  document.getElementById('rangeToGroup').style.display   = m==='range'   ? '' : 'none';
}

async function loadList() {
  setStatus('Loading record list\u2026');
  try {
    const res = await fetch(url() + '?action=list');
    const data = await res.json();
    if (data.status !== 'success') { setStatus('Error: ' + data.message, true); return; }
    allRecords = data.records || [];
    renderList(allRecords);
    setStatus('Loaded ' + allRecords.length + ' record(s). Check boxes and click Generate Labels for Selected, or use fetch controls above.');
  } catch(e) { setStatus('Failed to load: ' + e.message, true); }
}

function renderList(records) {
  const box = document.getElementById('recordList');
  const items = document.getElementById('recordItems');
  items.innerHTML = records.map((r,i) =>
    '<div class="record-item">' +
    '<input type="checkbox" data-idx="' + i + '" />' +
    '<div class="record-meta">' +
    '<span class="specnum">' + esc(r.specnum||'') + '</span> &nbsp; ' +
    '<span class="sp">' + esc(r.species||'') + '</span> &nbsp; ' +
    (r.county ? esc(r.county) + ' Co.' : '') + ' &nbsp; ' + esc(r.date||'') +
    '</div></div>'
  ).join('');
  box.style.display = '';
}

function selectAll(val) {
  document.querySelectorAll('#recordItems input[type=checkbox]').forEach(cb => cb.checked = val);
}

async function printSelected() {
  const checked = [...document.querySelectorAll('#recordItems input[type=checkbox]:checked')];
  if (!checked.length) { setStatus('Select at least one record first.', true); return; }
  const nums = checked.map(cb => allRecords[parseInt(cb.dataset.idx)].specnum);
  setStatus('Fetching ' + nums.length + ' record(s)\u2026');
  const records = [];
  for (const n of nums) {
    try {
      const res = await fetch(url() + '?action=get&specnum=' + encodeURIComponent(n));
      const data = await res.json();
      if (data.status === 'success') records.push(data.record);
    } catch(e) {}
  }
  renderLabels(records);
}

async function fetchAndRender() {
  const mode = document.getElementById('fetchMode').value;
  setStatus('Fetching records\u2026');
  try {
    if (mode === 'recent') {
      const n = document.getElementById('recentN').value || 4;
      const res = await fetch(url() + '?action=recent&n=' + n);
      const data = await res.json();
      if (data.status !== 'success') { setStatus('Error: ' + data.message, true); return; }
      renderLabels(data.records || []);
    } else if (mode === 'specnum') {
      const s = document.getElementById('specnumInput').value.trim();
      if (!s) { setStatus('Enter a specimen number.', true); return; }
      const res = await fetch(url() + '?action=get&specnum=' + encodeURIComponent(s));
      const data = await res.json();
      if (data.status !== 'success') { setStatus('Error: ' + data.message, true); return; }
      renderLabels([data.record]);
    } else if (mode === 'range') {
      const from = document.getElementById('rangeFrom').value.trim();
      const to   = document.getElementById('rangeTo').value.trim();
      if (!from || !to) { setStatus('Enter both From and To specimen numbers.', true); return; }
      const res = await fetch(url() + '?action=range&from=' + encodeURIComponent(from) + '&to=' + encodeURIComponent(to));
      const data = await res.json();
      if (data.status !== 'success') { setStatus('Error: ' + data.message, true); return; }
      renderLabels(data.records || []);
    }
  } catch(e) { setStatus('Fetch failed: ' + e.message, true); }
}

// Build narrative body paragraph combining notes + NPC + environment + associated species
function buildNarrative(r) {
  const notes  = String(r['Notes'] || '').trim();
  const assoc  = String(r['Associated Species'] || '').replace(/\.$/, '').trim();
  const hydro  = String(r['Hydrology'] || '').trim();
  const soil   = String(r['Soil Texture'] || '').trim();
  const sun    = String(r['Sun Exposure'] || '').trim();
  const npcP   = String(r['NPC Primary Code'] || '').trim();
  const npcPN  = String(r['NPC Primary Name'] || '').trim();
  const npcS   = String(r['NPC Secondary Code'] || '').trim();
  const npcSN  = String(r['NPC Secondary Name'] || '').trim();
  const parts = [];

  // Free-text notes from the field
  if (notes) parts.push(notes);

  // NPC
  if (npcP) {
    let s = 'Native plant community is ' + npcP;
    if (npcPN) s += ' (' + npcPN + ')';
    if (npcS) {
      s += ', transitioning to ' + npcS;
      if (npcSN) s += ' (' + npcSN + ')';
    }
    parts.push(s + '.');
  }

  // Environmental conditions
  const env = [];
  if (hydro) env.push('hydrology ' + hydro.toLowerCase());
  if (soil)  env.push('soils ' + soil.toLowerCase());
  if (sun)   env.push(sun.toLowerCase() + ' light exposure');
  if (env.length) parts.push('Habitat conditions include ' + env.join(', ') + '.');

  // Return prose and associated species list separately
  // (assoc names need <em> tags, prose does not)
  return { prose: parts.join(' '), assoc };
}

// Render associated species names in italic with plain connecting text
function assocHtml(assocStr) {
  if (!assocStr) return '';
  const names = assocStr.split(',').map(s => s.trim()).filter(Boolean);
  if (!names.length) return '';
  const italicNames = names.map(n => '<em>' + esc(n) + '</em>').join(', ');
  return 'Associated species include: ' + italicNames + '.';
}

// Build a single label div
function buildLabel(r) {
  if (!r) return '<div class="placeholder-label">[empty]</div>';

  const sp        = String(r['Species'] || '').trim();
  const auth      = String(r['Authority'] || '').trim();
  const loc       = String(r['Plants of (Locality)'] || '').trim();
  const county    = String(r['County'] || '').trim();
  const state     = String(r['State'] || '').trim();
  const lat       = String(r['Latitude (NAD83)'] || '').trim();
  const lon       = String(r['Longitude (NAD83)'] || '').trim();
  const collector = String(r['Primary Collector'] || '').trim();
  const observers = String(r['Other Observers'] || '').trim();
  const permit    = String(r['Special Permit No.'] || r['Special Permit No'] || r['Permit'] || '').trim();
  const specnum   = String(r['Specimen Number'] || '').trim();
  // Use collection date field, not the timestamp
  const date      = formatDate(r['Date'] || r['Collection Date'] || '');

  // Debug: log entire record so we can see all field names and values
  if (window._labelDebug) {
    console.log('=== RECORD DUMP ===');
    Object.keys(r).forEach(function(k){ console.log('  [' + k + '] =>', JSON.stringify(r[k])); });
  }
  const { prose, assoc } = buildNarrative(r);
  const bodyHtml = esc(prose) + (assoc ? ' ' + assocHtml(assoc) : '');

  // Collectors line
  let collLine = esc(collector);
  if (observers) collLine += ', ' + esc(observers);

  // Coordinates — decimal degrees, keep negative sign for longitude
  let coordLine = '';
  if (lat && lon) {
    coordLine = 'Lat. ' + esc(lat) + '&nbsp;&nbsp;&nbsp;&nbsp;Long. ' + esc(lon) + ' (NAD 83)';
  } else if (lat) {
    coordLine = 'Lat. ' + esc(lat) + ' (NAD 83)';
  }
  // TRS/QQ line
  const trsLine = String(r['TRS / QQ'] || '').trim();

  return `<div class="label">
  <div class="label-locality">Plants of ${esc(loc)}</div>
  <div class="label-county">${esc(county)} County, ${esc(state)}</div>
  <div class="label-name"><em>${esc(sp)}</em>${auth ? ' <span class="auth">' + esc(auth) + '</span>' : ''}</div>
  <div class="label-body">${bodyHtml}</div>
  ${coordLine ? `<div class="label-coords">${coordLine}</div>` : ''}
  ${trsLine ? `<div class="label-coords">${esc(trsLine)}</div>` : ''}
  <div class="label-footer">
    <div class="label-collector">${collLine}</div>
    <div class="label-footer-line">
      <span>Critical Connections Ecological Services</span>
      <span>${esc(specnum)}</span>
    </div>
    <div class="label-footer-line">
      <span>${permit ? 'Special Collector\'s Permit ' + esc(permit) : ''}</span>
      <span>${esc(date)}</span>
    </div>
  </div>
</div>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function formatDate(raw) {
  if (!raw) return '';
  const s = String(raw).trim();
  // If it already looks like plain text (e.g. "October 11, 2026"), return as-is
  if (!/^\d{4}-\d{2}-\d{2}/.test(s)) return s;
  // Parse ISO date string — treat as local date to avoid timezone shift
  const parts = s.split('T')[0].split('-');
  if (parts.length !== 3) return s;
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const month = months[parseInt(parts[1], 10) - 1] || '';
  const day   = parseInt(parts[2], 10);
  const year  = parts[0];
  return month + ' ' + day + ', ' + year;
}

function renderLabels(records) {
  if (!records || !records.length) { setStatus('No records returned.', true); return; }
  setStatus('Showing ' + records.length + ' label(s). Click Print Labels to print.');

  // Pad to multiple of 4
  const padded = [...records];
  while (padded.length % 4 !== 0) padded.push(null);

  let html = '';
  for (let i = 0; i < padded.length; i += 4) {
    html += '<div class="label-sheet"><div class="label-grid">';
    for (let j = i; j < i + 4; j++) html += buildLabel(padded[j]);
    html += '</div></div>';
  }

  document.getElementById('previewArea').innerHTML = html;
  document.getElementById('printBtnRow').style.display = 'flex';
  document.getElementById('previewArea').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
